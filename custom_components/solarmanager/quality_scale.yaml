rules:
  # ── Bronze ──────────────────────────────────────────────────────────────

  action-setup:
    status: exempt
    comment: Integration registers no actions/services.

  appropriate-polling:
    status: done
    comment: DataUpdateCoordinator with configurable interval (default 10 s, adjustable via options flow).

  brands:
    status: exempt
    comment: Custom component – no brands directory required.

  common-modules:
    status: done
    comment: Standard filenames used (sensor.py, binary_sensor.py, number.py, select.py, config_flow.py, coordinator.py, diagnostics.py).

  config-flow:
    status: done
    comment: ConfigFlow with async_step_user, duplicate check, and options flow for scan interval.

  config-flow-test-coverage:
    status: done
    comment: tests/test_config_flow.py covers user flow success/failure and re-auth flow.

  dependency-transparency:
    status: done
    comment: No external PyPI dependencies; only HA built-in libraries used.

  docs-actions:
    status: exempt
    comment: Integration registers no actions/services.

  docs-high-level-description:
    status: done
    comment: README opens with a clear description of the integration's purpose.

  docs-installation-instructions:
    status: done
    comment: README documents both HACS and manual installation paths.

  docs-removal-instructions:
    status: done
    comment: README has a Deinstallation section with UI, HACS, and manual removal steps.

  entity-event-setup:
    status: done
    comment: Entities are added via async_add_entities in async_setup_entry, not in __init__.

  entity-unique-id:
    status: done
    comment: All entities set _attr_unique_id from entry.entry_id + sensor key/device id.

  has-entity-name:
    status: done
    comment: All entity classes set _attr_has_entity_name = True.

  runtime-data:
    status: done
    comment: Coordinator stored in entry.runtime_data in async_setup_entry.

  test-before-configure:
    status: done
    comment: config_flow.py calls client.login() and stream_user_v3() before creating the config entry.

  test-before-setup:
    status: done
    comment: coordinator re-runs login on first update; auth failures raise ConfigEntryAuthFailed immediately.

  unique-config-entry:
    status: done
    comment: async_set_unique_id() + _abort_if_unique_id_configured() prevent duplicate entries per sm_id.

  # ── Silver ──────────────────────────────────────────────────────────────

  action-exceptions:
    status: exempt
    comment: Integration registers no actions/services.

  config-entry-unloading:
    status: done
    comment: async_unload_entry() delegates to hass.config_entries.async_unload_platforms().

  docs-configuration-parameters:
    status: done
    comment: README documents all config parameters (email, password, sm_id, api_key) and the scan_interval option.

  docs-installation-parameters:
    status: done
    comment: README documents prerequisites (HA ≥ 2024.1, Solar Manager cloud account, sm_id).

  entity-unavailable:
    status: done
    comment: CoordinatorEntity default handles coordinator-level unavailability. _DeviceBase overrides available to also check if the device is still present in the stream.

  integration-owner:
    status: done
    comment: CODEOWNERS file at repo root assigns @Soardiac; manifest.json also lists @Soardiac.

  log-when-unavailable:
    status: done
    comment: coordinator.py logs a warning on the first failed update (guarded by last_update_success check).

  parallel-updates:
    status: done
    comment: PARALLEL_UPDATES = 1 set in sensor.py, binary_sensor.py, number.py, select.py.

  reauthentication-flow:
    status: done
    comment: config_flow.py implements async_step_reauth / async_step_reauth_confirm; triggered automatically on ConfigEntryAuthFailed.

  test-coverage:
    status: todo
    comment: Config flow tests exist, but coordinator, platform entity creation, and API client are not yet covered.

  # ── Gold ────────────────────────────────────────────────────────────────

  devices:
    status: done
    comment: All entities set device_info with identifiers. Site device registered in __init__.py before platforms load; per-device entities use via_device.

  diagnostics:
    status: done
    comment: diagnostics.py implements async_get_config_entry_diagnostics with full credential redaction.

  discovery:
    status: exempt
    comment: Cloud-polling integration; devices cannot be discovered locally.

  discovery-update-info:
    status: exempt
    comment: No discovery support; exempt together with discovery rule.

  docs-data-update:
    status: done
    comment: README documents 10s default polling, 5-minute statistics refresh, and user-configurable scan interval.

  docs-examples:
    status: done
    comment: README has two automation YAML examples (solar-mode wallbox, battery-full notification).

  docs-known-limitations:
    status: done
    comment: README Hinweise section covers cloud-only access, parameter/mode dependency, and unknown device types.

  docs-supported-devices:
    status: done
    comment: README lists all supported device types (battery, wallbox, V2X, heat pump, boiler, smart plug, switch, inverter) and exclusions.

  docs-supported-functions:
    status: done
    comment: README tables cover all sensor, select, number, binary_sensor, and datetime entities with units and conditions.

  docs-troubleshooting:
    status: done
    comment: README has a Fehlerbehebung section with five symptom/solution entries.

  docs-use-cases:
    status: done
    comment: README has an Anwendungsfälle section with five concrete use cases.

  dynamic-devices:
    status: todo
    comment: Device entities are created at setup time only; devices added to the gateway after integration setup require an HA reload to get entities.

  entity-category:
    status: todo
    comment: DevicesOverviewSensor, signal binary_sensor, and other diagnostic entities are missing EntityCategory.DIAGNOSTIC.

  entity-device-class:
    status: todo
    comment: SocSensor missing SensorDeviceClass.BATTERY; DeviceTemperatureSensor device_class not verified; some per-device sensors may be missing appropriate device classes.

  entity-disabled-by-default:
    status: todo
    comment: DevicesOverviewSensor and interval energy counters should be disabled by default (_attr_entity_registry_enabled_default = False).

  entity-translations:
    status: todo
    comment: Entity labels are hardcoded strings; translation_key not yet used in platform classes.

  exception-translations:
    status: exempt
    comment: Integration registers no service actions. Custom exceptions (SolarmanagerAuthError etc.) are internal and never shown directly to users.

  icon-translations:
    status: todo
    comment: No icons.json; icons are defined inline. Requires adding icons.json with per-entity icon mapping.

  reconfiguration-flow:
    status: todo
    comment: No async_step_reconfigure implemented; users cannot change sm_id or credentials without removing the integration.

  repair-issues:
    status: exempt
    comment: No conditions require actionable user intervention via repair issues.

  stale-devices:
    status: done
    comment: async_remove_config_entry_device in __init__.py allows manual device removal when a device is no longer reported by the API.

  # ── Platinum ─────────────────────────────────────────────────────────────

  inject-websession:
    status: done
    comment: async_get_clientsession() used in coordinator and config flow instead of creating a raw aiohttp session.
